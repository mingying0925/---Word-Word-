<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title th:text="#{teacher.templates.title} + ' - SkillBridge'">模板库 - SkillBridge</title>
  <th:block th:replace="~{common/layout :: styles}"/>
  <style>
    .tl-section {
      margin-bottom: 28px;
      padding: 22px 24px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
    }
    .tl-section h2 {
      font-size: 15px;
      font-weight: 600;
      color: var(--morandi-text-primary);
      margin-bottom: 14px;
      letter-spacing: 0.3px;
    }
    .tl-upload-form .form-row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .tl-upload-form input[type="text"] {
      flex: 1;
      min-width: 200px;
    }
    .tl-upload-form input[type="file"] {
      padding: 8px 12px;
    }
    .tl-empty {
      text-align: center;
      padding: 36px 16px;
      color: var(--morandi-text-muted);
      font-size: 14px;
    }
    .tl-count-badge {
      display: inline-block;
      padding: 2px 8px;
      background: rgba(255,255,255,0.10);
      border-radius: 10px;
      font-size: 12px;
      color: var(--morandi-text-secondary);
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link" th:text="#{a11y.skipToMain}">跳到主要内容</a>
  <th:block th:replace="~{common/layout :: bg-cursor}"/>

  <div class="page-wrap">
    <div class="page-card glass-card" id="main-content">
      <th:block th:replace="~{common/layout :: teacher-nav(active='templates', title=#{teacher.templates.title})}"/>

      <div th:if="${msg}" class="msg-morandi msg-morandi--success" th:text="${msg}" style="margin-bottom:16px;"></div>
      <div th:if="${error}" class="msg-morandi msg-morandi--error" th:text="${error}" style="margin-bottom:16px;"></div>

      <!-- 上传新模板到库 -->
      <div class="tl-section">
        <h2 th:text="#{teacher.templates.uploadNew}">上传新模板到库</h2>
        <form class="tl-upload-form" method="post" th:action="@{/teacher/templates/upload}"
              enctype="multipart/form-data">
          <input type="hidden" name="_csrf" th:value="${session.csrfToken}"/>
          <div class="form-row">
            <input type="text" name="name" class="input-morandi" required
                   th:placeholder="#{teacher.templates.namePlaceholder}" maxlength="100"/>
            <input type="file" name="file" class="input-morandi" accept=".docx" required/>
            <button type="submit" class="btn-spring" th:text="#{btn.upload}">上传到库</button>
          </div>
          <div class="hint" style="margin-top:8px;font-size:12px;color:var(--morandi-text-muted);" th:text="#{teacher.templates.uploadHint}">
            上传的模板将自动解析书签并保存到库中，可在创建活动时直接复用。
          </div>
        </form>
      </div>

      <!-- 模板列表 -->
      <div class="tl-section">
        <h2 th:text="#{teacher.templates.saved}">已保存的模板</h2>
        <div th:if="${#lists.isEmpty(templates)}" class="tl-empty" th:text="#{teacher.templates.empty}">
          模板库为空，请上传模板或从活动列表保存已有模板。
        </div>
        <div class="table-wrap" th:if="${not #lists.isEmpty(templates)}">
          <table class="data-table">
            <thead>
            <tr>
              <th th:text="#{teacher.templates.column.id}">ID</th>
              <th th:text="#{teacher.templates.column.name}">模板名称</th>
              <th th:text="#{teacher.templates.column.fields}">字段数</th>
              <th th:text="#{teacher.templates.column.createdAt}">创建时间</th>
              <th th:text="#{teacher.templates.column.actions}">操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="t : ${templates}">
              <td th:text="${t.id}">1</td>
              <td th:text="${t.name}">模板名称</td>
              <td th:text="${t.fieldCount != null ? t.fieldCount : 0}">0</td>
              <td th:text="${t.createdAt != null ? #temporals.format(t.createdAt, 'yyyy-MM-dd HH:mm') : '—'}">—</td>
              <td>
                <form class="action-form" method="post" th:action="@{/teacher/create}" style="display:inline;">
                  <input type="hidden" name="_csrf" th:value="${session.csrfToken}"/>
                  <input type="hidden" name="templateId" th:value="${t.id}"/>
                  <input type="hidden" name="name" th:value="${t.name + '（基于模板 #' + t.id + '）'}"/>
                  <button type="submit" class="btn-spring" style="min-width:auto;padding:4px 12px;" th:text="#{teacher.templates.action.useToCreate}">用此模板创建活动</button>
                </form>
                <span class="action-sep">|</span>
                <a th:href="@{/teacher/templates/{id}/preview(id=${t.id})}" class="link-morandi" th:text="#{teacher.templates.action.preview}">预览字段</a>
                <span class="action-sep">|</span>
                <form class="action-form" method="post" th:action="@{/teacher/templates/delete}" style="display:inline;"
                      th:data-confirm="#{confirm.deleteTemplate.message}"
                      th:data-confirm-title="#{confirm.deleteTemplate.title}"
                      data-confirm-danger>
                  <input type="hidden" name="_csrf" th:value="${session.csrfToken}"/>
                  <input type="hidden" name="id" th:value="${t.id}"/>
                  <button type="submit" class="btn-delete" th:text="#{teacher.templates.action.delete}">删除</button>
                </form>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <th:block th:replace="~{common/layout :: scripts}"/>
</body>
</html>
