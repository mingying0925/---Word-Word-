# 生产环境配置覆盖
# 启动方式: java -jar skillbridge-web.jar --spring.profiles.active=prod
# 或: SPRING_PROFILES_ACTIVE=prod java -jar skillbridge-web.jar
#
# 注意：本文件仅覆盖与开发环境不同的关键项。
# 敏感配置（JWT_SECRET / CRYPTO_SECRET / DB_PASSWORD 等）必须通过环境变量注入，
# 不提供默认值，缺失时启动失败（fail-fast），防止误用开发默认密钥。

server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    # 生产环境使用 MySQL，通过环境变量注入。
    # 默认启用 useSSL=true 强制加密传输（可通过 DB_USE_SSL=false 显式关闭，仅限内网无 TLS 场景）。
    url: ${DB_URL:jdbc:mysql://localhost:3306/skillbridge?useSSL=true&requireSSL=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:skillbridge}
    password: ${DB_PASSWORD}
  h2:
    console:
      enabled: false  # 生产环境关闭 H2 控制台
  jpa:
    hibernate:
      ddl-auto: validate  # 生产环境不自动建表，由 Flyway 管理
    show-sql: false
    open-in-view: false  # 生产环境关闭 OSIV，避免懒加载在视图层触发不可控 SQL
  flyway:
    enabled: true  # 生产环境启用 Flyway 数据库迁移
    locations: classpath:db/migration
    baseline-on-migrate: true

export:
  service:
    # Python 导出微服务地址，生产环境必须显式注入（不回退到 localhost）。
    url: ${EXPORT_SERVICE_URL}

# Actuator 监控端点配置（生产环境收敛暴露面）
management:
  endpoints:
    web:
      exposure:
        include: health  # 仅暴露 health，info 等按需开启
  endpoint:
    health:
      show-details: never  # 生产环境不暴露健康详情，避免泄露依赖信息

# JWT 配置（生产环境强制）
# 密钥必须通过环境变量注入，无默认值（fail-fast），防止误用开发默认密钥导致 Token 可被伪造。
jwt:
  secret: ${JWT_SECRET}
  cookie-secure: true  # 生产环境部署在 HTTPS 反向代理之后，Cookie 必须 Secure
  cookie-same-site: Lax

app:
  # 敏感数据加密密钥（AES-256-GCM），生产环境必须通过环境变量注入，无默认值。
  crypto:
    secret: ${CRYPTO_SECRET}
  # 教师认证配置：默认管理员账号（仅首次启动时初始化）
  teacher:
    default-id: ${TEACHER_DEFAULT_ID:admin}
    default-password: ${TEACHER_DEFAULT_PASSWORD}
    default-name: ${TEACHER_DEFAULT_NAME:系统管理员}

logging:
  file:
    # 生产环境日志输出绝对路径，避免相对路径漂移
    path: ${LOG_PATH:/var/log/skillbridge}
