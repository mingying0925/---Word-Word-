server:
  port: 8080

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:h2:mem:skillbridge
    driver-class-name: org.h2.Driver
    username: sa
    password: ${H2_PASSWORD:}
  h2:
    console:
      enabled: true  # 仅本地开发启用，生产环境（application-prod.yml）已关闭
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update  # 开发环境自动建表，生产环境由 Flyway 管理（ddl-auto: validate）
    show-sql: false
  flyway:
    enabled: false  # 开发环境用 H2 ddl-auto 自动建表，关闭 Flyway
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

export:
  service:
    url: http://localhost:5000/api

# Actuator 监控端点配置
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized  # 仅授权用户可见详情

# JWT 鉴权配置（无状态，本地开发轻量化，不依赖 Redis）
jwt:
  # HS256 要求密钥长度 >= 32 字节(256 bit)。
  # 生产环境必须通过环境变量 JWT_SECRET 注入，此处仅提供本地开发默认值。
  secret: ${JWT_SECRET:SkillBridgeLocalDevSecretKey2026DoNotUseInProduction0123456789}
  # Token 有效期（毫秒），默认 2 小时 = 7200000ms
  expiration: ${JWT_EXPIRATION:7200000}
  # 存放 JWT 的 Cookie 名称
  cookie-name: skillbridge_token
  # Cookie 安全属性：生产环境（HTTPS）应设为 true
  cookie-secure: ${JWT_COOKIE_SECURE:false}
  # SameSite 策略：Lax（防 CSRF）/ Strict / None
  cookie-same-site: ${JWT_COOKIE_SAMESITE:Lax}

app:
  # API 版本号（用于 /api/v1/version 端点与 X-API-Version 响应头）
  api-version: v1
  # 应用版本号（用于页脚展示与版本端点）
  version: 0.0.1
  # 上传目录
  upload-dir: ${user.dir}/uploads
  # 教师认证配置：默认管理员账号（仅首次启动时初始化）
  teacher:
    default-id: ${TEACHER_DEFAULT_ID:admin}
    default-password: ${TEACHER_DEFAULT_PASSWORD:ChangeMe123!}
    default-name: ${TEACHER_DEFAULT_NAME:系统管理员}
  # 敏感数据加密密钥（AES-256-GCM），生产环境必须通过环境变量注入
  crypto:
    secret: ${CRYPTO_SECRET:SkillBridgeLocalDevSecretKey2026}
