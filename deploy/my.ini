# SkillBridge MySQL 8.0 配置（端口 3307，独立于系统 MySQL）
# 路径：D:\SkillBridge\deploy\my.ini
# 启动：D:\mysql\bin\mysqld.exe --defaults-file=D:\SkillBridge\deploy\my.ini --console

[mysqld]
# === 基础 ===
port=3307
basedir=D:/mysql
# 自定义 data 目录
datadir=D:/SkillBridge/mysql-data

# === 字符集 ===
character-set-server=utf8mb4
collation-server=utf8mb4_unicode_ci
init_connect='SET NAMES utf8mb4'

# === 网络 / 性能 ===
skip-name-resolve
max_connections=200
max_allowed_packet=64M
default-storage-engine=InnoDB

# === InnoDB ===
innodb_buffer_pool_size=256M
innodb_log_file_size=64M
innodb_flush_log_at_trx_commit=2

# === 日志 ===
log-error=D:/SkillBridge/logs/mysql-error.log
slow_query_log=1
slow_query_log_file=D:/SkillBridge/logs/mysql-slow.log
long_query_time=2

# === 时区 ===
default-time-zone='+08:00'

[client]
port=3307
default-character-set=utf8mb4

[mysql]
default-character-set=utf8mb4
